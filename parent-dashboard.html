<!DOCTYPE html>
<html>
<head>
  <title>Parent Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <h2>Parent Dashboard</h2>
  <button onclick="logout()">Logout</button>

  <hr>

  <h3>Add Child</h3>
  <input id="childName" placeholder="Child Name">
  <br><br>
  <input id="grade" placeholder="Grade">
  <br><br>
  <input id="section" placeholder="Section">
  <br><br>
  <button onclick="addChild()">Add Child</button>

  <hr>

  <h3>Your Children</h3>
  <ul id="childrenList"></ul>

  <hr>

  <h3>Book a Meeting</h3>
  <label>Select Child:</label><br>
  <select id="childSelect"></select>
  <br><br>
  <label>Select Teacher:</label><br>
  <select id="teacherSelect"></select>
  <br><br>
  <input type="datetime-local" id="meetingTime">
  <br><br>
  <input id="topic" placeholder="Meeting Topic">
  <br><br>
  <button onclick="bookMeeting()">Book Meeting</button>

  <hr>
  <a href="parent-meetings.html"><button>View My Meetings</button></a>

<script src="app.js"></script>
<script>
  (async () => {
    // Handle Google OAuth redirect — get session and save token
    const { data: { session } } = await supabaseClient.auth.getSession()
    
    if (session) {
      // Save token to localStorage
      localStorage.setItem('token', session.access_token)
      localStorage.setItem('role', 'parent')

      // Check if profile exists, if not create one
      const { data: profile } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single()

      if (!profile) {
        await supabaseClient
          .from('profiles')
          .insert([{
            id: session.user.id,
            email: session.user.email,
            role: 'parent',
            name: session.user.user_metadata.full_name
          }])
      }

      // ✅ Load data AFTER token is saved
      loadChildren()
      loadChildrenDropdown()
      loadTeachers()

    } else {
      // No Google session — check if email/password login token exists
      const token = localStorage.getItem('token')
      if (!token) {
        window.location.href = 'login.html'
        return
      }

      // Load data for email/password login
      loadChildren()
      loadChildrenDropdown()
      loadTeachers()
    }
  })()
</script>

</body>
</html>
